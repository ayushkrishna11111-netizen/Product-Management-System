<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-8">

<div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold text-center text-blue-600 mb-8">Product Management Dashboard</h1>

    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
        <h2 class="text-xl font-semibold mb-4" id="formTitle">Add New Product</h2>
        <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="hidden" id="productId">
            <input type="text" id="name" placeholder="Product Name" required class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            <input type="text" id="category" placeholder="Category" required class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            <input type="number" id="price" placeholder="Price" step="0.01" required class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            <input type="text" id="description" placeholder="Description" required class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 md:col-span-2">
            <button type="submit" class="bg-blue-600 text-white font-semibold py-2 rounded hover:bg-blue-700 transition md:col-span-2">Save Product</button>
        </form>
    </div>

    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-blue-600 text-white">
            <tr>
                <th class="p-4 border-b">ID</th>
                <th class="p-4 border-b">Name</th>
                <th class="p-4 border-b">Category</th>
                <th class="p-4 border-b">Price</th>
                <th class="p-4 border-b">Description</th>
                <th class="p-4 border-b text-center">Actions</th>
            </tr>
            </thead>
            <tbody id="productTableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8080/api/products";
    const form = document.getElementById("productForm");

    // Fetch and display products on load
    document.addEventListener("DOMContentLoaded", fetchProducts);

    async function fetchProducts() {
        const response = await fetch(API_URL);
        const products = await response.json();
        const tbody = document.getElementById("productTableBody");
        tbody.innerHTML = "";

        products.forEach(product => {
            tbody.innerHTML += `
                    <tr class="hover:bg-gray-100 transition border-b">
                        <td class="p-4">${product.id}</td>
                        <td class="p-4 font-semibold">${product.name}</td>
                        <td class="p-4 text-gray-600">${product.category}</td>
                        <td class="p-4 text-green-600 font-bold">$${product.price}</td>
                        <td class="p-4 text-sm text-gray-500">${product.description}</td>
                        <td class="p-4 text-center">
                            <button onclick="editProduct(${product.id})" class="text-blue-500 hover:text-blue-700 mr-3">Edit</button>
                            <button onclick="deleteProduct(${product.id})" class="text-red-500 hover:text-red-700">Delete</button>
                        </td>
                    </tr>
                `;
        });
    }

    // Handle Add / Update
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const id = document.getElementById("productId").value;
        const productData = {
            name: document.getElementById("name").value,
            category: document.getElementById("category").value,
            price: parseFloat(document.getElementById("price").value),
            description: document.getElementById("description").value
        };

        const method = id ? "PUT" : "POST";
        const url = id ? `${API_URL}/${id}` : API_URL;

        await fetch(url, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(productData)
        });

        form.reset();
        document.getElementById("productId").value = "";
        document.getElementById("formTitle").innerText = "Add New Product";
        fetchProducts();
    });

    // Edit functionality (Populates form)
    async function editProduct(id) {
        const response = await fetch(`${API_URL}/${id}`);
        const product = await response.json();

        document.getElementById("productId").value = product.id;
        document.getElementById("name").value = product.name;
        document.getElementById("category").value = product.category;
        document.getElementById("price").value = product.price;
        document.getElementById("description").value = product.description;

        document.getElementById("formTitle").innerText = "Edit Product";
        window.scrollTo(0, 0);
    }

    // Delete functionality
    async function deleteProduct(id) {
        if(confirm("Are you sure you want to delete this product?")) {
            await fetch(`${API_URL}/${id}`, { method: "DELETE" });
            fetchProducts();
        }
    }
</script>
</body>
</html>
